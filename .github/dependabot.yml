version: 2

updates:
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2

  - package-ecosystem: "npm"
    directory: "/functions"
    schedule:
      interval: weekly
    open-pull-requests-limit: 2

  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: weekly
    open-pull-requests-limit: 2

  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
